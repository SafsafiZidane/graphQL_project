services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: trafficdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build: .
    command: npm run dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/trafficdb
      - JWT_SECRET=ChangeThisSecret
      - JWT_EXPIRES_IN=2h
    depends_on:
      - postgres

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    command: npm run dev -- --host 0.0.0.0
    working_dir: /app
    volumes:
      - ./frontend:/app 
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:4000/graphql
      - VITE_TELEMETRY_URL=ws://backend:4000/telemetry
    depends_on:
      - backend

volumes:
  postgres-data:
